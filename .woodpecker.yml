when:
  - branch: [main, dev]
    event: [push, pull_request]

steps:
  - name: version-guard
    image: node:22-bookworm
    depends_on: [install]
    commands:
      # 1. Fetch main so we can see its history
      - git fetch origin main
      
      # 2. Extract versions using node
      - CURRENT_VERSION=$(node -p "require('./package.json').version")
      - LAST_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
      
      - echo "Current version in branch: $CURRENT_VERSION"
      - echo "Latest version in main:   $LAST_VERSION"
      
      # 3. Compare using semver. 
      # This fails the build (exit 1) if CURRENT is NOT greater than LAST.
      - |
        npx semver $CURRENT_VERSION --range ">$LAST_VERSION" || (
          echo "❌ VERSION ERROR: Current version ($CURRENT_VERSION) must be higher than main ($LAST_VERSION).";
          echo "Please update package.json before pushing to dev.";
          exit 1
        )
    when:
      branch: main
      
  # ── 1. Install dependencies ─────────────────────────────────────
  - name: install
    image: node:22-bookworm
    environment:
      CI: "true"
    commands:
      - npm ci --no-audit --no-fund --prefer-offline --legacy-peer-deps
    when:
      branch: [main, dev]

  # ── 2a. Lint (parallel with test) ───────────────────────────────
  - name: lint
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - git fetch origin main
      - npx nx affected --target=lint --base=origin/main --parallel=3

    when:
      branch: [main, dev]

  # ── 2b. Test (parallel with lint) ───────────────────────────────
  - name: test
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - npx nx affected  --base=origin/main --target=test --passWithNoTests --parallel=3
    when:
      branch: [main, dev]

  # ── 3. Build all apps (both are needed for the single Docker image) ──
  - name: build
    image: node:22-bookworm
    depends_on: [lint, test]
    environment:
      CI: "true"
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends python3 make g++
      - npx nx run-many --all --target=build --parallel=3
    when:
      branch: main

  # ── 4. Extract version tag ───────────────────────────────────────
  - name: get-version
    image: node:22-bookworm
    depends_on: [build]
    commands:
      - node -p "require('./package.json').version" > .tags
      - echo ",latest" >> .tags
    when:
      branch: main

  # ── 5. Publish single unified image ─────────────────────────────
  - name: publish
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [get-version]
    settings:
      dockerfile: packages/apps/backend/Dockerfile
      context: . # root so COPY can reach both packages/apps/backend/dist and packages/apps/frontend/dist
      repo: rongorlik/easy-charts
      auto_tag: true
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_password
    when:
      branch: main