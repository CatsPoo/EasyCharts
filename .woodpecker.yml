when:
  - branch: [main, dev]
    event: [push, pull_request]

workspace:
  base: /woodpecker
  path: src

steps:
  - name: restore-npm-cache
    image: meltwater/drone-cache
    settings:
      backend: "filesystem"
      restore: true
      cache_key: "node_modules"
      # This MUST match the path inside the container
      filesystem_root: "/tmp/cache"
      mount:
        - node_modules

  - name: restore-nx-cache
    image: meltwater/drone-cache
    settings:
      backend: "filesystem"
      restore: true
      cache_key: "nx"
      # This MUST match the path inside the container
      filesystem_root: "/tmp/cache"
      mount:
        - .cache/nx

  # ── 1. Install dependencies ─────────────────────────────────────
  - name: install
    image: node:22-bookworm-slim
    environment:
      CI: "true"
    extra_hosts:
      - "registry.npmjs.org:104.16.9.34" 
    commands:
      - npm ci --legacy-peer-deps --prefer-offline --no-audit --no-fund --loglevel info
    depends_on: [restore-npm-cache]

  - name: rebuild-npm-cache
    image: meltwater/drone-cache
    settings:
      backend: "filesystem"
      rebuild: true
      cache_key: "node_modules"
      filesystem_root: "/tmp/cache"
      mount:
        - node_modules
    when:
      event: push
      branch: [main, dev]
    depends_on: [install]

# ── 1.5 Version Guard (Enforces bump on 'dev' branch) ────────────
  - name: version-guard
    image: node:22-bookworm-slim
    depends_on: [install]
    extra_hosts:
      - "deb.debian.org:146.75.54.132"
    commands:
      - apt-get update && apt-get install -y git --no-install-recommends
      - git fetch origin main
      - CURRENT_VERSION=$(node -p "require('./package.json').version")
      - LAST_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
      - echo "Checking version... Branch ($CURRENT_VERSION) vs Main ($LAST_VERSION)"
      # Wrap the command in quotes so the colon doesn't break YAML
      - "npx semver $CURRENT_VERSION --range \">$LAST_VERSION\" || (echo \"❌ VERSION ERROR: You must bump the version in package.json before pushing to dev!\" && exit 1)"
    when:
      branch: [main]

  # ── 2. Lint & Test (Parallel) ───────────────────────────────────
  - name: lint
    image: node:22-bookworm-slim
    depends_on: [install,restore-nx-cache]
    commands:
      - apt-get update && apt-get install -y git --no-install-recommends
      # 2. Now git commands will work
      - git fetch origin main
      - npx nx affected --target=lint --base=origin/main --parallel=3
    extra_hosts:
      - "deb.debian.org:146.75.54.132"
    when:
      branch: [main, dev]
      

  - name: test
    image: node:22-bookworm-slim
    depends_on: [install,restore-nx-cache]
    commands:
      - apt-get update && apt-get install -y git --no-install-recommends
      # 2. Now git commands will work
      - git fetch origin main
      - npx nx affected --target=test --base=origin/main --passWithNoTests --parallel=3
    extra_hosts:
      - "deb.debian.org:146.75.54.132"
    when:
      branch: [main, dev]

  # ── 3. Build (Only on Main) ─────────────────────────────────────
  - name: build
    image: node:22-bookworm-slim
    depends_on: [lint, test]
    extra_hosts:
      - "deb.debian.org:146.75.54.132"
    #daemon_dns: "8.8.8.8
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends python3 make g++ git
      - git fetch origin main
      - npx nx run-many --target=build --parallel=3
    when:
      branch: main

  - name: rebuild-nx-cache
    image: meltwater/drone-cache
    settings:
      backend: "filesystem"
      rebuild: true
      cache_key: "nx"
      filesystem_root: "/tmp/cache"
      mount:
        - .cache/nx
    when:
      event: push
      branch: main
    depends_on: [build]

  # ── 4. Publish ──────────────────────────────────────────────────
  - name: publish
    image: docker:dind
    privileged: true
    depends_on: [build]
    extra_hosts:
      - "registry-1.docker.io:34.226.132.191"
      - "auth.docker.io:104.18.43.178"
      - "docker.io:54.85.90.162"
    environment:
      DOCKER_USERNAME:
        from_secret: dockerhub_username
      DOCKER_PASSWORD:
        from_secret: dockerhub_password
    commands:
      - echo "nameserver 8.8.8.8" > /etc/resolv.conf
      - dockerd &
      - sleep 5
      - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
      - VERSION=$(grep '"version"' package.json | head -1 | awk -F'"' '{print $4}')
      - echo "Building version $VERSION"
      - docker build -t rongorlik/easy-charts:$VERSION -t rongorlik/easy-charts:latest .
      - docker push rongorlik/easy-charts:$VERSION
      - docker push rongorlik/easy-charts:latest
    when:
      branch: main