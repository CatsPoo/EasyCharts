when:
  - branch: [main, dev]
    event: [push, pull_request]

workspace:
  base: /woodpecker
  path: src

steps:
  - name: restore-cache
    image: meltwater/drone-cache
    settings:
      backend: "filesystem"
      restore: true
      cache_key: "node_modules"
      # This MUST match the path inside the container
      filesystem_root: "/tmp/cache"
      mount:
        - node_modules

  # ── 1. Install dependencies ─────────────────────────────────────
  - name: install
    image: node:22-alpine
    environment:
      CI: "true"
    commands:
      - npm config set maxsockets 3
      # Increase the timeout so it doesn't give up so fast
      - npm config set fetch-retry-maxtimeout 600000
      - npm config set fetch-retries 10
      # Now run the install
      - npm ci --legacy-peer-deps --prefer-offline --loglevel warn #--no-audit --no-fund --prefer-offline 

  - name: rebuild-cache
    image: meltwater/drone-cache
    settings:
      backend: "filesystem"
      rebuild: true
      cache_key: "node_modules"
      filesystem_root: "/tmp/cache"
      mount:
        - node_modules
    when:
      event: push
      branch: [main, dev]

# ── 1.5 Version Guard (Enforces bump on 'dev' branch) ────────────
  - name: version-guard
    image: node:22-alpine
    depends_on: [install]
    commands:
      - git fetch origin main
      - CURRENT_VERSION=$(node -p "require('./package.json').version")
      - LAST_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
      - echo "Checking version... Branch ($CURRENT_VERSION) vs Main ($LAST_VERSION)"
      # Wrap the command in quotes so the colon doesn't break YAML
      - "npx semver $CURRENT_VERSION --range \">$LAST_VERSION\" || (echo \"❌ VERSION ERROR: You must bump the version in package.json before pushing to dev!\" && exit 1)"
    when:
      branch: dev

  # ── 2. Lint & Test (Parallel) ───────────────────────────────────
  - name: lint
    image: node:22-alpine
    depends_on: [install]
    commands:
      - git fetch origin main
      - npx nx affected --target=lint --base=origin/main --parallel=3
    when:
      branch: [main, dev]

  - name: test
    image: node:22-alpine
    depends_on: [install]
    commands:
      - git fetch origin main
      - npx nx affected --target=test --base=origin/main --passWithNoTests --parallel=3
    when:
      branch: [main, dev]

  # ── 3. Build (Only on Main) ─────────────────────────────────────
  - name: build
    image: node:22-alpine
    depends_on: [lint, test]
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends python3 make g++
      - npx nx run-many --all --target=build --parallel=3
    when:
      branch: main

  # ── 4. Publish ──────────────────────────────────────────────────
  - name: publish
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [build]
    settings:
      dockerfile: ./Dockerfile
      context: .
      repo: rongorlik/easy-charts
      # Automatically use version from package.json for tagging
      tags: ${CI_COMMIT_TAG:-latest}
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_password
    when:
      branch: main