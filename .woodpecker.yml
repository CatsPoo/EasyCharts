
steps:

  # ── 1. Install dependencies ─────────────────────────────────────
  - name: install
    image: node:22-bookworm
    environment:
      CI: "true"
    commands:
      - npm ci --no-audit --no-fund --prefer-offline --legacy-peer-deps
    when:
      branch: [main, dev]

  # ── 2a. Lint (parallel with test) ───────────────────────────────
  - name: lint
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - git fetch origin main
      - npx nx affected --target=lint --base=origin/main --parallel=3

    when:
      branch: [main, dev]

  # ── 2b. Test (parallel with lint) ───────────────────────────────
  - name: test
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - npx nx affected  --base=origin/main --target=test --passWithNoTests --parallel=3
    when:
      branch: [main, dev]

  # ── 3. Verify build compiles ─────────────────────────────────────
  - name: build
    image: node:22-bookworm
    depends_on: [lint, test]
    environment:
      CI: "true"
    commands:
      - apk add --no-cache python3 make g++
      - npx nx affected --target=build --parallel=3
    when:
      branch: main3

  # ── 4a. Publish backend image ────────────────────────────────────
  - name: publish-backend
    image: woodpeckerci/plugin-docker-buildx
    privileged: true # Required for buildx to run
    depends_on: [build]
    settings:
      dockerfile: packages/apps/backend/Dockerfile
      context: . # Start at root so it can see all packages
      repo: rongorlik/easy-charts:backend-latest
      auto_tag: true
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_password
    when:
      branch: main
      path: "packages/apps/backend/**"

  # ── 4b. Publish frontend image ───────────────────────────────────
  - name: publish-frontend
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [build]
    settings:
      dockerfile: packages/apps/frontend/Dockerfile
      context: .
      repo: rongorlik/easy-charts:frontend-latest
      auto_tag: true
      username:
        from_secret: dockehub_username
      password:
        from_secret: dockerhub_password
    when:
      branch: main
      path: "packages/apps/frontend/**"
