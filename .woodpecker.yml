when:
  - branch: [main, dev]
    event: [push, pull_request]

steps:
  # ── 1. Install dependencies ─────────────────────────────────────
  - name: install
    image: node:22-bookworm
    environment:
      CI: "true"
    commands:
      - npm ci --no-audit --no-fund --prefer-offline --legacy-peer-deps
    when:
      branch: [main, dev]

  # ── 2a. Lint (parallel with test) ───────────────────────────────
  - name: lint
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - git fetch origin main
      - npx nx affected --target=lint --base=origin/main --parallel=3

    when:
      branch: [main, dev]

  # ── 2b. Test (parallel with lint) ───────────────────────────────
  - name: test
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - npx nx affected  --base=origin/main --target=test --passWithNoTests --parallel=3
    when:
      branch: [main, dev]

  # ── 3. Verify build compiles ─────────────────────────────────────
  - name: build
    image: node:22-bookworm
    depends_on: [lint, test]
    environment:
      CI: "true"
    commands:
      - apk add --no-cache python3 make g++
      - npx nx affected --target=build --parallel=3
    when:
      branch: main

  - name: get-version
    image: node:22-bookworm
    depends_on: [build]
    commands:
      # This pulls the version from package.json and writes it to a file named .tags
      - node -p "require('./package.json').version" > .tags
      # Optional: Add 'latest' so you always have a pointer to the newest version
      - echo ",latest" >> .tags 
    when:
      branch: main

