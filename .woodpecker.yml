when:
  - branch: [main, dev]
    event: [push, pull_request]

steps:
  # ── 1. Install dependencies ─────────────────────────────────────
  - name: install
    image: node:22-bookworm
    environment:
      CI: "true"
    commands:
      # Use --loglevel error to keep logs clean and avoid buffer issues
      - npm ci --no-audit --no-fund --prefer-offline --legacy-peer-deps --loglevel error

  # ── 1.5 Version Guard (Runs on Dev) ─────────────────────────────
  - name: version-guard
    image: node:22-bookworm
    depends_on: [install]
    commands:
      - git fetch origin main
      - CURRENT_VERSION=$(node -p "require('./package.json').version")
      - LAST_VERSION=$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")
      - echo "Current version in branch: $CURRENT_VERSION"
      - echo "Latest version in main:   $LAST_VERSION"
      # Using a standard string instead of a block literal to avoid unmarshaling errors
      - npx semver $CURRENT_VERSION --range ">$LAST_VERSION" || (echo "❌ VERSION ERROR: Bump package.json version!" && exit 1)
    when:
      branch: dev

  # ── 2a. Lint ────────────────────────────────────────────────────
  - name: lint
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - git fetch origin main
      - npx nx affected --target=lint --base=origin/main --parallel=3
    when:
      branch: [main, dev]

  # ── 2b. Test ────────────────────────────────────────────────────
  - name: test
    image: node:22-bookworm
    depends_on: [install]
    environment:
      CI: "true"
    commands:
      - git fetch origin main
      - npx nx affected --base=origin/main --target=test --passWithNoTests --parallel=3
    when:
      branch: [main, dev]

  # ── 3. Build ────────────────────────────────────────────────────
  - name: build
    image: node:22-bookworm
    depends_on: [lint, test]
    environment:
      CI: "true"
    commands:
      - apt-get update -qq && apt-get install -y --no-install-recommends python3 make g++
      - npx nx run-many --all --target=build --parallel=3
    when:
      branch: main

  # ── 4. Extract version tag ──────────────────────────────────────
  - name: get-version
    image: node:22-bookworm
    depends_on: [build]
    commands:
      - node -p "require('./package.json').version" > .tags
      - echo ",latest" >> .tags
    when:
      branch: main

  # ── 5. Publish ──────────────────────────────────────────────────
  - name: publish
    image: woodpeckerci/plugin-docker-buildx
    privileged: true
    depends_on: [get-version]
    settings:
      dockerfile: packages/apps/backend/Dockerfile
      context: .
      repo: rongorlik/easy-charts
      # The plugin will read .tags automatically
      username:
        from_secret: dockerhub_username
      password:
        from_secret: dockerhub_password
    when:
      branch: main